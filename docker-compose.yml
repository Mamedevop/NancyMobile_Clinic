version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nancymobile-db
    restart: always
    environment:
      POSTGRES_DB: nancymobile
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - nancymobile-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: nancymobile-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nancymobile.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - nancymobile-network

networks:
  nancymobile-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: